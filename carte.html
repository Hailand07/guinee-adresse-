<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÉNÉFOUNYI | Carte Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        
        .address-label {
            background-color: white;
            color: #0f172a;
            font-family: sans-serif;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            white-space: nowrap;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="map"></div>

    <script>
        // Initialisation Supabase
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");

        async function initMap() {
            // Centre la carte sur Conakry
            const conakryCenter = { lat: 9.6455, lng: -13.5784 };

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 13,
                center: conakryCenter,
                disableDefaultUI: false,
                zoomControl: true,
            });

            // Récupération des données
            const { data, error } = await _supabase.from('recensement').select('*');

            if (error) {
                console.error("Erreur Supabase:", error);
                return;
            }

            if (data) {
                data.forEach(item => {
                    if(item.latitude && item.longitude) {
                        
                        // Texte du label
                        const labelText = `${item.nom || 'Sans Nom'} - ${item.quartier || 'Zone Inconnue'}`;

                        // Création du marqueur
                        const marker = new google.maps.Marker({
                            position: { lat: parseFloat(item.latitude), lng: parseFloat(item.longitude) },
                            map: map,
                            title: item.nom,
                            label: {
                                text: labelText,
                                className: 'address-label',
                            }
                        });

                        // Contenu de la bulle d'info corrigé
                        const infoContent = `
                            <div style="padding:10px; font-family:sans-serif; text-align:center;">
                                <h3 style="margin:0; font-weight:bold; text-transform:uppercase; color:#0f172a;">${item.nom || 'Anonyme'}</h3>
                                <p style="margin:5px 0; font-size:11px; color:gray;">${item.quartier || 'Quartier inconnu'}</p>
                                <a href="https://www.google.com/maps?q=${item.latitude},${item.longitude}" target="_blank" style="display:inline-block; background-color:#1d4ed8; color:white; font-size:10px; font-weight:bold; padding:6px 12px; text-decoration:none; border-radius:6px; margin-top:5px;">Y ALLER (GPS)</a>
                            </div>
                        `;

                        const infoWindow = new google.maps.InfoWindow({
                            content: infoContent
                        });

                        marker.addListener("click", () => {
                            infoWindow.open(map, marker);
                        });
                    }
                });
            }
        }

        // Lancement au chargement de la page
        window.onload = initMap;
    </script>
</body>
</html>
