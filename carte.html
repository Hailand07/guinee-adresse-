<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÉNÉFOUNYI | Recensement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 pb-24">
    <div class="max-w-md mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-black text-slate-900">SÉNÉFOUNYI</h1>
            <p class="text-xs font-bold text-orange-600 uppercase tracking-widest">Nouveau Recensement</p>
        </header>

        <div class="space-y-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nom Complet</label>
                <input type="text" id="nom" placeholder="Ex: Mamadou Diallo" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-orange-500">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Quartier</label>
                <input type="text" id="quartier" placeholder="Ex: Kaloum" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
            </div>
            <button onclick="envoyerDonnees()" id="btn-submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest mt-4">
                Enregistrer la position
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-slate-900/95 backdrop-blur-md p-3 rounded-2xl shadow-2xl flex justify-around items-center z-[5000]">
        <a href="index.html" class="flex flex-col items-center">
            <span class="text-xl">📝</span>
            <span class="text-[9px] font-bold uppercase text-white">Saisir</span>
        </a>
        <a href="carte.html" class="flex flex-col items-center opacity-40 hover:opacity-100">
            <span class="text-xl">📍</span>
            <span class="text-[9px] font-bold uppercase text-white">Carte</span>
        </a>
        <a href="admin.html" class="flex flex-col items-center opacity-40 hover:opacity-100">
            <span class="text-xl">🔐</span>
            <span class="text-[9px] font-bold uppercase text-white">Admin</span>
        </a>
    </div>

    <script>
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");

        async function envoyerDonnees() {
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "LOCALISATION EN COURS...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { error } = await _supabase.from('recensement').insert([{
                    nom: document.getElementById('nom').value,
                    quartier: document.getElementById('quartier').value,
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude
                }]);

                if (error) alert("Erreur");
                else {
                    alert("Succès !");
                    location.reload();
                }
            }, () => {
                alert("Activez votre GPS");
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
            });
        }
    </script>
</body>
</html>
