<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÉNÉFOUNYI | Carte Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        
        /* STYLE POUR LES ÉTIQUETTES (Labels) */
        .address-label {
            background-color: white;
            color: #0f172a;
            font-family: sans-serif;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            white-space: nowrap; /* Empêche le retour à la ligne */
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="map"></div>

    <script>
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");

        async function initMap() {
            // Centre la carte sur Conakry (coordonnées moyennes de tes tests)
            const conakryCenter = { lat: 9.6455, lng: -13.5784 };

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 13,
                center: conakryCenter,
                mapId: "DEMO_MAP_ID", // Maintient le style de carte que tu aimes
                disableDefaultUI: true, // Désactive les boutons Google pour plus de propreté
                zoomControl: true, // On garde juste le zoom
            });

            // Récupère toutes les données de Supabase
            const { data, error } = await _supabase.from('recensement').select('*');

            if (data) {
                data.forEach(item => {
                    if(item.latitude && item.longitude) {
                        
                        // Création du label avec Nom + Quartier
                        const labelText = 0{item.nom || 'Sans Nom'} - {item.quartier || 'Zone Inconnue'}`;

                        // CRÉATION DU MARQUEUR (PIN POINTU)
                        const marker = new google.maps.Marker({
                            position: { lat: item.latitude, lng: item.longitude },
                            map: map,
                            title: item.nom,
                            // Utilisation d'un label persistant
                            label: {
                                text: labelText,
                                className: 'address-label', // Applique le style CSS défini en haut
                            },
                            // Icône par défaut (pin rouge pointu) de Google
                            // Pour le forcer à être rouge et pointu, on n'ajoute pas de style d'icône personnalisé
                        });

                        // Bulle d'info au clic (pour avoir le lien GPS)
                        const infoWindow = new google.maps.InfoWindow({
                            content: `
                                <div style="padding:10px; font-family:sans-serif; text-align:center;">
                                    <h3 style="margin:0; font-weight:bold; text-transform:uppercase; color:#0f172a;">${item.nom}</h3>
                                    <p style="margin:5px 0; font-size:11px; color:gray;">${item.quartier}</p>
                                    <a href="https://www.google.com/maps?q=${item.latitude},${item.longitude}" target="_blank" style="display:inline-block; background-color:#1d4ed8; color:white; font-size:10px; font-weight:bold; padding:6px 12px; text-decoration:none; border-radius:6px; margin-top:5px;">Y ALLER (GPS)</a>
                                </div>
                            `
                        });

                        marker.addListener("click", () => {
                            infoWindow.open(map, marker);
                        });
                    }
                });
            }
        }

        // Lancer la carte au chargement
        window.onload = initMap;
    </script>
</body>
</html>
