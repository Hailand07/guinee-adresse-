<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÉNÉFOUNYI | Livreur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen pb-24 text-white">

    <header class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-black tracking-tighter italic">SÉNÉ EXPRESS ⚡️</h1>
            <p class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Livraisons en attente</p>
        </div>
        <div class="bg-yellow-500 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black" id="count">0</div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        <div id="delivery-list" class="space-y-4">
            <p class="text-center text-slate-500 py-10 text-xs italic">Recherche de colis...</p>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-white/10 backdrop-blur-xl p-3 rounded-3xl shadow-2xl flex justify-around items-center border border-white/5 z-[5000]">
        <a href="index.html" class="flex flex-col items-center opacity-40 hover:opacity-100">
            <span class="text-xl">🏠</span>
            <span class="text-[8px] font-bold uppercase text-white">Accueil</span>
        </a>
        <a href="carte.html" class="flex flex-col items-center opacity-40 hover:opacity-100">
            <span class="text-xl">📍</span>
            <span class="text-[8px] font-bold uppercase text-white">Carte</span>
        </a>
        <a href="livreur.html" class="flex flex-col items-center">
            <span class="text-xl">🛵</span>
            <span class="text-[8px] font-bold uppercase text-yellow-500">Livreur</span>
        </a>
    </div>

    <script>
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");

        async function loadDeliveries() {
            const { data, error } = await _supabase
                .from('recensement') // On utilise ta table actuelle pour le test
                .select('*')
                .order('created_at', { ascending: false });

            const container = document.getElementById('delivery-list');
            const counter = document.getElementById('count');

            if (data && data.length > 0) {
                counter.innerText = data.length;
                container.innerHTML = "";
                data.forEach(order => {
                    const mapsUrl = `https://www.google.com/maps?q=${order.latitude},${order.longitude}`;
                    
                    container.innerHTML += `
                        <div class="bg-slate-800 p-5 rounded-[2rem] border border-slate-700 shadow-lg group active:scale-95 transition-all">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-white uppercase text-sm">${order.nom || 'Client Anonyme'}</h3>
                                    <p class="text-[10px] text-slate-400 font-bold">📍 ${order.quartier || 'Zone non définie'}</p>
                                </div>
                                <span class="bg-green-500/10 text-green-500 px-2 py-1 rounded-lg text-[8px] font-black uppercase tracking-tighter">Prêt</span>
                            </div>
                            
                            <div class="flex gap-2">
                                <a href="${mapsUrl}" target="_blank" class="flex-1 bg-yellow-500 text-slate-900 text-center py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg shadow-yellow-500/20">
                                    Lancer l'itinéraire 🚀
                                </a>
                            </div>
                            
                            <div class="mt-4 pt-4 border-t border-slate-700 flex justify-between items-center">
                                <span class="text-[9px] text-slate-500 font-mono">ID: #${order.id.toString().slice(-4)}</span>
                                <button onclick="alert('Livraison validée !')" class="text-[9px] font-black text-slate-400 hover:text-white uppercase underline">Marquer comme livré</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p class='text-center text-slate-600 py-10 text-xs italic text-white'>Aucune course disponible pour le moment.</p>";
            }
        }

        window.onload = loadDeliveries;
    </script>
</body>
</html>
