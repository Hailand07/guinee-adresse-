<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | Localisation GPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-xl text-center border-t-8 border-red-600">
        <h2 class="text-2xl font-black mb-6">Accès Sécurisé 🇬🇳</h2>
        <input type="password" id="admin-pass" placeholder="Code secret" class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center text-2xl outline-none">
        <button onclick="checkPass()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl">ACCÉDER</button>
    </div>

    <div id="admin-content" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
            <h1 class="text-xl font-black uppercase tracking-widest">Base de Données GPS</h1>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold">ACTUALISER</button>
        </div>
        <div id="data-list" class="space-y-4"></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");

        function checkPass() {
            if(document.getElementById('admin-pass').value === "22400") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadData();
            } else { alert("Code incorrect"); }
        }

        async function loadData() {
            const { data, error } = await _supabase.from('recensement').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('data-list');
            container.innerHTML = "";

            data.forEach(item => {
                // On utilise les coordonnées pures
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${item.latitude},${item.longitude}`;

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center gap-4";
                card.innerHTML = `
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-900 uppercase">${item.nom}</h3>
                        <p class="text-xs text-slate-500">${item.quartier}</p>
                        <p class="text-[10px] font-mono text-blue-600 mt-1">${item.latitude.toFixed(6)}, ${item.longitude.toFixed(6)}</p>
                    </div>
                    <a href="${mapsUrl}" target="_blank" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-xs tracking-widest uppercase">
                        LOCALISER
                    </a>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
