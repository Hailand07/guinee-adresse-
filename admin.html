<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sénéfounyi | Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-xl text-center">
        <h2 class="text-2xl font-black mb-6 text-slate-900">Accès Sécurisé 🇬🇳</h2>
        <input type="password" id="admin-pass" placeholder="Code d'accès" class="w-full p-4 bg-gray-100 rounded-xl mb-4 outline-none border-2 focus:border-blue-500 text-center text-xl font-bold">
        <button onclick="checkPass()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all">SE CONNECTER</button>
    </div>

    <div id="admin-content" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Liste des Résidents</h1>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700">Actualiser</button>
        </div>

        <div id="data-list" class="space-y-4 pb-10">
            <p class="text-center text-slate-400 font-medium italic">Chargement des données en cours...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mxgdthpexmszutqhoawb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "22400") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadData();
            } else {
                alert("Code incorrect !");
            }
        }

        async function loadData() {
            const { data, error } = await _supabase
                .from('recensement')
                .select('*')
                .order('created_at', { ascending: false });

            const container = document.getElementById('data-list');
            container.innerHTML = "";

            if (error) {
                container.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-xl text-center font-bold">Erreur : ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = "<p class='text-center text-slate-500 py-10 font-bold'>Aucun enregistrement trouvé dans la base.</p>";
                return;
            }

            data.forEach(item => {
                let mapsUrl, itineraryUrl;

                // LOGIQUE DE MISE À JOUR : Priorité Lat/Lon pour une précision infaillible
                if (item.latitude && item.longitude) {
                    // Utilisation des coordonnées GPS directes
                    mapsUrl = `https://www.google.com/maps?q=${item.latitude},${item.longitude}`;
                    itineraryUrl = `https://www.google.com/maps/dir/?api=1&destination=${item.latitude},${item.longitude}`;
                } else {
                    // Secours avec le Plus Code + Guinea pour éviter la France
                    const query = encodeURIComponent(item.plus_code + " Guinea");
                    mapsUrl = `https://www.google.com/maps/search/?api=1&query=${query}`;
                    itineraryUrl = `https://www.google.com/maps/dir/?api=1&destination=${query}`;
                }

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border-l-4 border-green-500 mb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:shadow-md transition-shadow";
                card.innerHTML = `
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-900 text-lg leading-tight uppercase">${item.nom || 'Sans Nom'}</h3>
                        <p class="text-sm text-slate-600 font-medium">${item.quartier || 'Quartier non précisé'} • <span class="text-green-600 font-bold">${item.telephone || ''}</span></p>
                        <div class="mt-2 p-2 bg-slate-50 rounded-lg border border-slate-100 inline-block">
                           <p class="text-[10px] font-mono text-blue-600 uppercase tracking-tight font-black">CODE : ${item.plus_code}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <a href="${mapsUrl}" target="_blank" class="flex-1 md:flex-none text-center bg-slate-900 text-white px-4 py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm active:scale-95 transition-all">
                            Voir
                        </a>
                        <a href="${itineraryUrl}" target="_blank" class="flex-1 md:flex-none text-center bg-blue-600 text-white px-4 py-3 rounded-xl text-xs font-black uppercase tracking-widest shadow-sm active:scale-95 transition-all">
                            GPS
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
