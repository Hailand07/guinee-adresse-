<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sénéfounyi | Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-xl text-center border-t-8 border-slate-900">
        <h2 class="text-2xl font-black mb-6">Accès Sécurisé 🇬🇳</h2>
        <input type="password" id="admin-pass" placeholder="Code secret" class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center text-2xl outline-none border-2 focus:border-green-500">
        <button onclick="checkPass()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl">SE CONNECTER</button>
    </div>

    <div id="admin-content" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm">
            <h1 class="text-xl font-black text-slate-900 uppercase">Registre des Adresses</h1>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xs">ACTUALISER</button>
        </div>
        <div id="data-list" class="space-y-4"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://mxgdthpexmszutqhoawb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkPass() {
            if(document.getElementById('admin-pass').value === "22400") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadData();
            } else { alert("Code incorrect"); }
        }

        async function loadData() {
            const { data, error } = await _supabase
                .from('recensement')
                .select('*')
                .order('created_at', { ascending: false });

            const container = document.getElementById('data-list');
            container.innerHTML = "";

            if (error) return container.innerHTML = "Erreur de connexion.";

            data.forEach(item => {
                // SOLUTION RADICALE : On utilise les coordonnées GPS (Lat/Lon) 
                // C'est ce qui empêchera le message "Impossible de trouver..."
                const lat = item.latitude;
                const lon = item.longitude;
                
                // Si on a les coordonnées, on ignore le Plus Code pour le lien
                // Format : https://www.google.com/maps?q=latitude,longitude
                const mapsUrl = (lat && lon) 
                    ? `https://www.google.com/maps?q=${lat},${lon}`
                    : `https://www.google.com/maps/search/${encodeURIComponent(item.plus_code + " Guinea")}`;

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border-l-8 border-green-600 flex flex-col md:flex-row justify-between items-center gap-4";
                card.innerHTML = `
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-900 uppercase">${item.nom}</h3>
                        <p class="text-sm text-slate-500">${item.quartier} • <span class="text-green-600 font-bold">${item.telephone}</span></p>
                        <p class="text-[10px] font-mono text-blue-500 mt-1 font-bold">PLUS CODE : ${item.plus_code}</p>
                    </div>
                    <a href="${mapsUrl}" target="_blank" class="w-full md:w-auto bg-slate-900 text-white px-8 py-3 rounded-xl text-center font-black text-xs tracking-widest">
                        LOCALISER
                    </a>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
