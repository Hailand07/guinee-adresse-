<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sénéfounyi - Adressage National</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/openlocationcode@1.0.4/lib/openlocationcode.min.js"></script>
    <style>
        :root { --gn-red: #CE1126; --gn-yellow: #FCD116; --gn-green: #009460; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid var(--gn-red); }
        h2 { color: #333; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 25px; }
        .flag-line { height: 4px; display: flex; margin-bottom: 20px; }
        .f-r { flex: 1; background: var(--gn-red); } .f-y { flex: 1; background: var(--gn-yellow); } .f-g { flex: 1; background: var(--gn-green); }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .gps-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; text-align: center; margin-top: 10px; }
        #precision-ui { font-size: 0.8em; font-weight: bold; margin-top: 5px; }
        .btn-gps { background: #333; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-save { background: var(--gn-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: not-allowed; font-size: 18px; font-weight: bold; margin-top: 25px; opacity: 0.5; }
        .status-ready { opacity: 1; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div class="flag-line"><div class="f-r"></div><div class="f-y"></div><div class="f-g"></div></div>
    <h2>Sénéfounyi 🇬🇳</h2>
    <p class="subtitle">Enregistrement d'adresse numérique</p>

    <label>Nom complet du propriétaire</label>
    <input type="text" id="nom" placeholder="Ex: Mamadou Diallo">

    <label>Quartier / Commune</label>
    <input type="text" id="quartier" placeholder="Ex: Matoto / Conakry">

    <label>Numéro de téléphone</label>
    <input type="tel" id="tel" placeholder="+224 6XX XX XX XX">

    <div class="gps-box">
        <button class="btn-gps" id="btn-gps" onclick="startGPS()">ACTIVER MON GPS</button>
        <p id="plus-code" style="font-weight:bold; color:var(--gn-red); margin-top:10px;">En attente du signal...</p>
        <div id="precision-ui">Précision : --</div>
    </div>

    <button class="btn-save" id="btn-save" onclick="saveData()" disabled>ENREGISTRER MA MAISON</button>
</div>

<script>
    // --- CONFIGURATION SUPABASE ---
    const _URL = "TA_URL_SUPABASE"; 
    const _KEY = "TA_CLE_ANON_SUPABASE";
    const supabase = lib.createClient(_URL, _KEY);

    let finalCoords = { lat: null, lng: null };
    let watchId = null;

    function startGPS() {
        const btnGps = document.getElementById('btn-gps');
        const precisionUi = document.getElementById('precision-ui');
        const saveBtn = document.getElementById('btn-save');

        btnGps.innerHTML = "Recherche satellites...";
        
        // Options Haute Précision
        const options = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };

        watchId = navigator.geolocation.watchPosition((pos) => {
            const acc = pos.coords.accuracy;
            finalCoords.lat = pos.coords.latitude;
            finalCoords.lng = pos.coords.longitude;

            // Calcul du Plus Code
            const code = OpenLocationCode.encode(finalCoords.lat, finalCoords.lng, 11);
            document.getElementById('plus-code').innerHTML = "CODE : " + code;

            // UI de précision
            precisionUi.innerHTML = `Précision : +/- ${Math.round(acc)} mètres`;
            
            if(acc <= 15) { // Si précision meilleure que 15m
                precisionUi.style.color = "green";
                saveBtn.disabled = false;
                saveBtn.classList.add('status-ready');
                btnGps.style.background = "#009460";
                btnGps.innerHTML = "GPS FIXÉ ✅";
            } else {
                precisionUi.style.color = "orange";
                saveBtn.disabled = true;
                saveBtn.classList.remove('status-ready');
            }
        }, (err) => {
            alert("Erreur GPS : Activez la localisation haute précision.");
        }, options);
    }

    async function saveData() {
        const n = document.getElementById('nom').value;
        const q = document.getElementById('quartier').value;
        const t = document.getElementById('tel').value;
        const pc = document.getElementById('plus-code').innerText;

        if(!n || !q || !t) return alert("Remplis tous les champs !");

        const { data, error } = await supabase
            .from('recensement')
            .insert([{ 
                nom: n, 
                quartier: q, 
                telephone: t, 
                plus_code: pc,
                latitude: finalCoords.lat,
                longitude: finalCoords.lng
            }]);

        if (error) {
            alert("Erreur : " + error.message);
        } else {
            alert("Félicitations ! Votre maison est officiellement enregistrée. 🇬🇳");
            if(watchId) navigator.geolocation.clearWatch(watchId);
            location.reload();
        }
    }
</script>

</body>
</html>
