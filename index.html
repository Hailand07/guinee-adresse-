<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sénéfounyi - Adressage 224</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gn-red: #CE1126; --gn-yellow: #FCD116; --gn-green: #009460; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 6px solid var(--gn-red); }
        h2 { text-align: center; color: #1a1a1a; margin-top: 10px; }
        .flag { height: 4px; display: flex; margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
        .r { flex: 1; background: var(--gn-red); } .y { flex: 1; background: var(--gn-yellow); } .g { flex: 1; background: var(--gn-green); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        .gps-zone { background: #fff9e6; border: 2px dashed var(--gn-yellow); padding: 15px; border-radius: 12px; text-align: center; margin: 15px 0; }
        #btn-gps { background: #1a1a1a; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        #status-gps { font-weight: bold; font-size: 0.9em; color: var(--gn-red); margin: 5px 0; }
        #precision { font-size: 0.8em; color: #666; }
        .btn-save { background: var(--gn-green); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; opacity: 0.3; transition: 0.3s; }
        .active { opacity: 1 !important; box-shadow: 0 5px 15px rgba(0,148,96,0.3); }
    </style>
</head>
<body>

<div class="card">
    <div class="flag"><div class="r"></div><div class="y"></div><div class="g"></div></div>
    <h2>Sénéfounyi 🇬🇳</h2>
    <p style="text-align:center; color:#666; margin-bottom:20px;">Adressage Numérique National</p>

    <input type="text" id="nom" placeholder="Nom du propriétaire">
    <input type="text" id="quartier" placeholder="Quartier / Ville">
    <input type="tel" id="tel" placeholder="Numéro de téléphone">

    <div class="gps-zone">
        <button id="btn-gps" onclick="getLocation()">ACTIVER LE GPS</button>
        <div id="status-gps">Signal en attente...</div>
        <div id="precision">Précision: --</div>
    </div>

    <button class="btn-save" id="btn-save" onclick="sendData()" disabled>ENREGISTRER LA MAISON</button>
</div>

<script>
    // --- TES CLÉS À REMPLIR ICI ---
    const SUPABASE_URL = "TON_URL";
    const SUPABASE_KEY = "TA_CLE";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let coords = { lat: null, lon: null };

    function getLocation() {
        const status = document.getElementById('status-gps');
        const precision = document.getElementById('precision');
        const btnSave = document.getElementById('btn-save');
        const btnGps = document.getElementById('btn-gps');

        status.innerText = "Recherche en cours...";
        
        if (!navigator.geolocation) {
            alert("Votre navigateur ne supporte pas le GPS.");
            return;
        }

        // Mode surveillance pour affiner la position
        navigator.geolocation.watchPosition(
            (pos) => {
                coords.lat = pos.coords.latitude;
                coords.lon = pos.coords.longitude;
                let acc = Math.round(pos.coords.accuracy);

                precision.innerText = "Précision : +/- " + acc + " mètres";
                status.innerText = "📍 Position captée !";
                status.style.color = "var(--gn-green)";
                btnGps.style.background = "var(--gn-green)";
                btnGps.innerText = "GPS OK";

                // On active le bouton si la précision est correcte (< 30m pour Conakry c'est déjà bien)
                if (acc < 35) {
                    btnSave.disabled = false;
                    btnSave.classList.add('active');
                }
            },
            (err) => {
                if(err.code == 1) alert("Merci d'autoriser la localisation dans les réglages de Safari.");
                else if(err.code == 3) alert("Délai dépassé. Sortez dehors pour mieux capter les satellites.");
                status.innerText = "Erreur GPS (" + err.code + ")";
            },
            { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
    }

    async function sendData() {
        const n = document.getElementById('nom').value;
        const q = document.getElementById('quartier').value;
        const t = document.getElementById('tel').value;

        if(!n || !q || !t) return alert("Remplissez tous les champs.");

        // On génère un Plus Code simplifié (format manuel) ou on stocke juste lat/lon
        const { error } = await supabase
            .from('recensement')
            .insert([{ 
                nom: n, 
                quartier: q, 
                telephone: t, 
                latitude: coords.lat, 
                longitude: coords.lon,
                plus_code: coords.lat.toFixed(5) + "," + coords.lon.toFixed(5)
            }]);

        if (error) alert("Erreur Supabase: " + error.message);
        else {
            alert("✅ Enregistré avec succès !");
            location.reload();
        }
    }
</script>

</body>
</html>
