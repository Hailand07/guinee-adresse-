<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-ADRESSE | Localisation Directe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-2 border-4 border-slate-800">
        <div class="h-2 w-full bg-gradient-to-r from-[#CE1126] via-[#FCD116] to-[#009460]"></div>
        
        <div class="p-6">
            <h1 class="text-2xl font-black text-slate-900 leading-none mb-6">SÉNÉFOUNYI <span class="text-sm font-bold text-green-600 block">ADRESSAGE GPS DIRECT</span></h1>

            <div id="main-interface" class="space-y-4">
                <div id="gps-status" class="bg-slate-100 p-5 rounded-3xl text-center border-2 border-dashed border-slate-300">
                    <p id="coord-display" class="text-lg font-mono font-bold text-slate-400 italic">Position non capturée</p>
                    <p id="accuracy-display" class="text-[10px] uppercase font-black text-slate-400 mt-1">Attente du signal...</p>
                </div>

                <button onclick="startTracking()" id="btn-gps" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all">
                    📍 VERROUILLER MA POSITION
                </button>

                <div class="space-y-3">
                    <input type="text" id="nom" placeholder="Nom du Propriétaire" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-green-500 outline-none">
                    <input type="text" id="quartier" placeholder="Quartier / Commune" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-green-500 outline-none">
                </div>

                <button onclick="saveToCloud()" id="btn-send" class="w-full bg-[#009460] opacity-50 text-white font-black py-5 rounded-[2rem] shadow-xl mt-4" disabled>
                    ENREGISTRER LA MAISON
                </button>
            </div>

            <div id="success" class="hidden py-10 text-center">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">✓</div>
                <h3 class="text-2xl font-black text-slate-900">ENREGISTRÉ !</h3>
                <button onclick="location.reload()" class="mt-8 text-blue-600 font-bold underline">Nouvelle saisie</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");
        let currentPos = { lat: null, lon: null };

        function startTracking() {
            const btn = document.getElementById('btn-gps');
            btn.innerText = "🛰️ Recherche Satellite...";
            
            navigator.geolocation.watchPosition((pos) => {
                const acc = Math.round(pos.coords.accuracy);
                currentPos.lat = pos.coords.latitude;
                currentPos.lon = pos.coords.longitude;

                document.getElementById('coord-display').innerText = `${currentPos.lat.toFixed(5)}, ${currentPos.lon.toFixed(5)}`;
                document.getElementById('accuracy-display').innerText = `Précision : +/- ${acc}m`;

                if (acc < 30) {
                    document.getElementById('gps-status').classList.replace('bg-slate-100', 'bg-green-50');
                    document.getElementById('gps-status').classList.replace('border-slate-300', 'border-green-500');
                    document.getElementById('coord-display').classList.remove('text-slate-400');
                    document.getElementById('coord-display').classList.add('text-green-700');
                    
                    document.getElementById('btn-send').disabled = false;
                    document.getElementById('btn-send').classList.remove('opacity-50');
                    btn.innerText = "POSITION VERROUILLÉE ✅";
                }
            }, null, { enableHighAccuracy: true });
        }

        async function saveToCloud() {
            const nom = document.getElementById('nom').value;
            const quartier = document.getElementById('quartier').value;

            if(!nom || !currentPos.lat) return alert("Position ou nom manquant");

            const { error } = await _supabase.from('recensement').insert([{ 
                nom, quartier, latitude: currentPos.lat, longitude: currentPos.lon 
            }]);

            if (!error) {
                document.getElementById('main-interface').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
