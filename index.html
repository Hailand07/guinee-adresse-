<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-ADRESSE | Système Officiel Connecté</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/open-location-code@1.0.3/openlocationcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen p-4 flex flex-col items-center font-sans">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-2 border-4 border-slate-800">
        <div class="h-2 w-full bg-gradient-to-r from-[#CE1126] via-[#FCD116] to-[#009460]"></div>
        
        <div class="p-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-black text-slate-900 leading-none">GN-ADRESSE</h1>
                    <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest text-green-600">Base de Données Nationale</p>
                </div>
                <div class="text-2xl">🇬🇳</div>
            </div>

            <div id="main-interface" class="space-y-4">
                <div id="gps-box" class="hidden bg-slate-900 text-white p-5 rounded-3xl text-center shadow-inner border-2 border-yellow-400/30">
                    <div class="text-[9px] text-yellow-400 font-bold uppercase mb-1 tracking-widest">Code Géographique Unique</div>
                    <div id="plus-code" class="text-3xl font-mono font-black text-white">----</div>
                    <div id="accuracy" class="text-[10px] text-slate-400 mt-1 italic"></div>
                </div>

                <button onclick="getLocation()" id="btn-gps" class="w-full bg-slate-100 text-slate-900 font-bold py-4 rounded-2xl border-2 border-slate-200 active:scale-95 transition-all">
                    📍 Capturer ma Position GPS
                </button>

                <div class="pt-2 space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Identité du Résident</label>
                    <input type="text" id="nom" placeholder="Nom Complet (ex: Mamadou Sylla)" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-green-500 outline-none transition-all">
                    <input type="text" id="quartier" placeholder="Quartier (ex: Ratoma)" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-green-500 outline-none transition-all">
                    <input type="tel" id="tel" placeholder="Numéro de Téléphone" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-green-500 outline-none transition-all">
                </div>

                <button onclick="sendToSupabase()" id="btn-send" class="w-full bg-[#009460] hover:bg-green-700 text-white font-black py-5 rounded-[2rem] shadow-xl mt-4 active:scale-95 transition-all">
                    ENREGISTRER À L'ÉTAT CIVIL
                </button>
            </div>

            <div id="success" class="hidden py-10 text-center">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">✓</div>
                <h3 class="text-2xl font-black text-slate-900 leading-tight">VOTRE ADRESSE<br>EST ENREGISTRÉE</h3>
                <p class="text-sm text-slate-500 mt-3 px-4">Les données ont été transmises avec succès au serveur central de la République.</p>
                <button onclick="location.reload()" class="mt-8 text-blue-600 font-bold text-sm underline decoration-2">Nouvel Enregistrement</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION SUPABASE (Tes clés réelles)
        const SUPABASE_URL = "https://mxgdthpexmszutqhoawb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const olc = new OpenLocationCode();
        let codeFinal = "";

        // Fonction pour capter le GPS
        function getLocation() {
            const btn = document.getElementById('btn-gps');
            btn.innerText = "🛰️ Recherche Satellite...";
            
            navigator.geolocation.getCurrentPosition((pos) => {
                codeFinal = olc.encode(pos.coords.latitude, pos.coords.longitude, 10);
                document.getElementById('plus-code').innerText = codeFinal;
                document.getElementById('accuracy').innerText = `Précision : +/- ${Math.round(pos.coords.accuracy)}m`;
                document.getElementById('gps-box').classList.remove('hidden');
                btn.innerText = "Position Verrouillée ✅";
                btn.classList.replace('bg-slate-100', 'bg-blue-50');
            }, (err) => {
                alert("Erreur : Activez votre GPS et autorisez l'accès.");
                btn.innerText = "Réessayer";
            }, {enableHighAccuracy: true});
        }

        // Fonction pour envoyer à ta base de données Supabase
        async function sendToSupabase() {
            const nom_val = document.getElementById('nom').value;
            const quartier_val = document.getElementById('quartier').value;
            const tel_val = document.getElementById('tel').value;

            if(!nom_val || !codeFinal) {
                alert("Veuillez remplir votre nom et capturer votre position GPS.");
                return;
            }

            const btnSend = document.getElementById('btn-send');
            btnSend.innerText = "Transmission en cours...";
            btnSend.disabled = true;

            // ENVOI RÉEL VERS LA TABLE 'recensement'
            const { data, error } = await _supabase
                .from('recensement')
                .insert([{ 
                    nom: nom_val, 
                    telephone: tel_val, 
                    plus_code: codeFinal, 
                    quartier: quartier_val 
                }]);

            if (error) {
                console.error("Erreur détectée :", error);
                alert("Erreur de connexion : " + error.message);
                btnSend.innerText = "Réessayer";
                btnSend.disabled = false;
            } else {
                // Succès ! On affiche l'écran de confirmation
                document.getElementById('main-interface').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
