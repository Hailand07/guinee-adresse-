<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÉNÉFOUNYI | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <header class="bg-white p-6 shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-slate-900">SÉNÉ BOUTIQUE</h1>
                <p class="text-[10px] font-bold text-green-600 uppercase tracking-widest">Articles disponibles à Conakry</p>
            </div>
            <div class="bg-slate-100 p-3 rounded-2xl text-xl">🛒</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="client-product-list" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center text-slate-400 py-10 text-xs font-bold">Recherche des articles en cours...</p>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-slate-900/95 backdrop-blur-md p-3 rounded-2xl shadow-2xl flex justify-around items-center z-[5000]">
        <a href="index.html" class="flex flex-col items-center opacity-40 hover:opacity-100">
            <span class="text-xl">📝</span>
            <span class="text-[9px] font-bold uppercase text-white">Saisir</span>
        </a>
        <a href="carte.html" class="flex flex-col items-center opacity-40 hover:opacity-100">
            <span class="text-xl">📍</span>
            <span class="text-[9px] font-bold uppercase text-white">Carte</span>
        </a>
        <a href="boutique_client.html" class="flex flex-col items-center">
            <span class="text-xl">🛒</span>
            <span class="text-[9px] font-bold uppercase text-white">Boutique</span>
        </a>
    </div>

    <script>
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");

        async function loadStore() {
            const { data, error } = await _supabase
                .from('produits')
                .select('*')
                .order('created_at', { ascending: false });

            const container = document.getElementById('client-product-list');

            if (data && data.length > 0) {
                container.innerHTML = "";
                data.forEach(p => {
                    container.innerHTML += `
                        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 flex flex-col">
                            <div class="h-32 bg-slate-200 relative">
                                <img src="${p.image_url || 'https://via.placeholder.com/300'}" class="w-full h-full object-cover">
                                <span class="absolute top-2 right-2 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[9px] font-black shadow-sm">
                                    NEW
                                </span>
                            </div>
                            <div class="p-3 flex-1 flex flex-col justify-between">
                                <div>
                                    <h3 class="text-xs font-black text-slate-900 uppercase leading-tight mb-1">${p.nom_produit}</h3>
                                    <p class="text-[9px] text-slate-400 font-bold mb-2">📍 ${p.zone || 'Conakry'}</p>
                                </div>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="text-sm font-black text-orange-600">${p.prix} <small class="text-[8px]">GNF</small></span>
                                    <button class="bg-slate-900 text-white p-2 rounded-xl text-[10px] font-bold">
                                        ACHETER
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p class='col-span-2 text-center text-slate-300 text-xs py-10'>Aucun article en rayon pour le moment.</p>";
            }
        }

        window.onload = loadStore;
    </script>
</body>
</html>
