<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HailandX - Console Admin</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --admin-blue: #34495e;
            --success-green: #2ecc71;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 15px;
            color: #2c3e50;
        }

        .admin-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.3rem; color: var(--admin-blue); text-align: center; margin-bottom: 5px; }

        /* Scanner Zone */
        #reader {
            width: 100%;
            min-height: 250px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
            border: 3px solid var(--admin-blue);
            position: relative;
        }

        /* Empêcher Safari de déformer la vidéo */
        #reader video {
            object-fit: cover !important;
        }

        .start-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            z-index: 10;
        }

        .btn-start {
            padding: 15px 30px;
            background: var(--success-green);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .form-group { margin-bottom: 12px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            -webkit-appearance: none;
        }

        input[readonly] { background: #f0f4f8; color: var(--success-green); border-color: var(--success-green); }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--success-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
        }

        #status-msg {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: bold;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>🛡️ Admin Catalogue</h1>
        
        <div id="reader">
            <div class="start-overlay" id="overlay">
                <button class="btn-start" onclick="initScanner()">DÉMARRER LE SCANNER</button>
            </div>
        </div>

        <div id="status-msg"></div>

        <div class="form-group">
            <label>Code-Barres</label>
            <input type="text" id="barcode" placeholder="Code auto-détecté..." readonly>
        </div>

        <div class="form-group">
            <label>Nom du Produit</label>
            <input type="text" id="p-name" placeholder="Ex: Riz Uncle Sam 25kg">
        </div>

        <div class="form-group">
            <label>Catégorie</label>
            <select id="p-cat">
                <option value="Alimentation">Alimentation</option>
                <option value="Boisson">Boisson</option>
                <option value="Divers">Divers</option>
            </select>
        </div>

        <button class="btn-save" id="btn-save" onclick="enregistrer()">ENREGISTRER AU CATALOGUE</button>
    </div>

    <script>
        const supabaseUrl = 'https://plisyaquijijmwbbuegy.supabase.co';
        const supabaseKey = 'sb_publishable_nfKDb7KXudkpzLPa-nTMtQ_FRW6sQj_'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let html5QrCode;

        async function chercherInfosProduit(barcode) {
            const statusMsg = document.getElementById('status-msg');
            const nameInput = document.getElementById('p-name');
            
            statusMsg.innerHTML = "🔍 Recherche dans la base locale...";

            // ÉTAPE 1 : Vérifier dans ton Supabase
            const { data, error } = await _supabase
                .from('referentiel_produits')
                .select('*')
                .eq('code_barre', barcode)
                .maybeSingle();

            if (data) {
                statusMsg.innerHTML = "<span style='color:orange'>⚠️ Déjà dans le catalogue !</span>";
                nameInput.value = data.nom_standard;
                document.getElementById('p-cat').value = data.categorie;
                return;
            }

            // ÉTAPE 2 : Si inconnu, interroger l'API Open Food Facts
            statusMsg.innerHTML = "🌍 Produit inconnu. Recherche sur le Web...";
            
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const result = await response.json();

                if (result.status === 1) {
                    const nomTrouve = result.product.product_name_fr || result.product.product_name || "Produit Web";
                    nameInput.value = nomTrouve;
                    statusMsg.innerHTML = "<span style='color:var(--success-green)'>✨ Infos trouvées sur le Web !</span>";
                } else {
                    // ÉTAPE 3 : Plan B (Lien de Scraping manuel pour l'admin de Guinée)
                    statusMsg.innerHTML = "<span style='color:red'>❌ Inconnu partout.</span>";
                    const searchUrl = `https://www.jumia.com.gn/catalog/?q=${barcode}`;
                    statusMsg.innerHTML += ` <a href="${searchUrl}" target="_blank" style="color:blue; font-size:0.7rem;">Chercher sur Jumia ↗️</a>`;
                    nameInput.value = ""; 
                }
            } catch (e) {
                statusMsg.innerHTML = "Erreur réseau lors de la recherche.";
            }
        }

        async function initScanner() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status-msg').innerText = "Accès caméra...";

            html5QrCode = new Html5Qrcode("reader", { 
                verbose: false,
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true 
                }
            });

            const config = { 
                fps: 15, 
                qrbox: { width: 250, height: 180 },
                aspectRatio: 1.0,
                videoConstraints: {
                    facingMode: "environment"
                }
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    async (text) => {
                        document.getElementById('barcode').value = text;
                        if(navigator.vibrate) navigator.vibrate(100);
                        await chercherInfosProduit(text);
                    }
                );
                document.getElementById('status-msg').innerText = "Scanner prêt : Visez un code-barres";
                
                const videoElement = document.querySelector('#reader video');
                if (videoElement) {
                    videoElement.setAttribute('playsinline', 'true');
                    videoElement.setAttribute('webkit-playsinline', 'true');
                }

            } catch (err) {
                console.error(err);
                document.getElementById('status-msg').innerHTML = "<span style='color:red'>Erreur : Caméra bloquée ou non-HTTPS.</span>";
                document.getElementById('overlay').style.display = 'flex';
            }
        }

        async function enregistrer() {
            const barcode = document.getElementById('barcode').value;
            const name = document.getElementById('p-name').value.trim();
            const cat = document.getElementById('p-cat').value;
            const btn = document.getElementById('btn-save');

            if(!barcode || !name) {
                alert("Veuillez scanner un code et donner un nom.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Enregistrement...";

            const { error } = await _supabase
                .from('referentiel_produits')
                .insert([{ code_barre: barcode, nom_standard: name, categorie: cat }]);

            if(!error) {
                alert("✅ Produit ajouté avec succès !");
                document.getElementById('barcode').value = "";
                document.getElementById('p-name').value = "";
                document.getElementById('status-msg').innerText = "Prêt pour le scan suivant...";
            } else {
                alert("Erreur: " + error.message);
            }
            btn.disabled = false;
            btn.innerText = "ENREGISTRER AU CATALOGUE";
        }
    </script>
</body>
</html>
