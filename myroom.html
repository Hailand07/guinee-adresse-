<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HailandX - Console Admin</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --admin-blue: #34495e;
            --success-green: #2ecc71;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 15px;
            color: #2c3e50;
        }

        .admin-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        #reader {
            width: 100%;
            min-height: 250px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            margin-bottom: 10px;
            border: 3px solid var(--admin-blue);
            position: relative;
        }

        #reader video { object-fit: cover !important; }

        .controls-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-flash { background: #f1c40f; color: #000; }
        .btn-start { background: var(--success-green); color: white; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 0.85rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        input[readonly] { background: #f0f4f8; color: var(--success-green); border-color: var(--success-green); font-weight: bold; }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--admin-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1 style="text-align:center; font-size:1.2rem;">🛡️ Gestion Catalogue</h1>
        
        <div id="reader"></div>

        <div class="controls-row">
            <button class="btn-action btn-start" id="btn-toggle" onclick="initScanner()">DÉMARRER SCAN</button>
            <button class="btn-action btn-flash" id="btn-flash" onclick="toggleFlash()" style="display:none;">🔦 FLASH</button>
        </div>

        <div class="form-group">
            <label>Code détecté</label>
            <input type="text" id="barcode" placeholder="En attente..." readonly>
        </div>

        <div class="form-group">
            <label>Nom du Produit</label>
            <input type="text" id="p-name" placeholder="Ex: Sac de Riz 25kg">
        </div>

        <button class="btn-save" id="btn-save" onclick="enregistrer()">ENREGISTRER</button>
    </div>

    <script>
        const _supabase = supabase.createClient('https://plisyaquijijmwbbuegy.supabase.co', 'sb_publishable_nfKDb7KXudkpzLPa-nTMtQ_FRW6sQj_');
        let html5QrCode;
        let isFlashOn = false;

        async function initScanner() {
            const btnToggle = document.getElementById('btn-toggle');
            btnToggle.disabled = true;
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = { 
                fps: 20, 
                qrbox: { width: 280, height: 160 },
                aspectRatio: 1.0,
                // On active explicitement les formats de codes-barres classiques
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13, 
                    Html5QrcodeSupportedFormats.EAN_8, 
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.QR_CODE 
                ]
            };

            try {
                await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                    document.getElementById('barcode').value = text;
                    if(navigator.vibrate) navigator.vibrate(100);
                    document.getElementById('reader').style.borderColor = "var(--success-green)";
                });
                
                btnToggle.innerText = "ARRÊTER";
                btnToggle.style.background = "#e74c3c";
                btnToggle.disabled = false;
                document.getElementById('btn-flash').style.display = "block";

            } catch (err) {
                alert("Erreur Caméra : " + err);
                btnToggle.disabled = false;
            }
        }

        async function toggleFlash() {
            try {
                isFlashOn = !isFlashOn;
                await html5QrCode.applyVideoConstraints({
                    advanced: [{ torch: isFlashOn }]
                });
            } catch (e) {
                console.log("Flash non supporté sur cet appareil");
            }
        }

        async function enregistrer() {
            const code = document.getElementById('barcode').value;
            const name = document.getElementById('p-name').value.trim();
            const btn = document.getElementById('btn-save');

            if(!code || !name) return alert("Scan et Nom obligatoires !");

            btn.disabled = true;
            btn.innerText = "⏳...";

            const { error } = await _supabase
                .from('referentiel_produits')
                .insert([{ code_barre: code, nom_standard: name }]);

            if(!error) {
                alert("✅ Ajouté !");
                document.getElementById('barcode').value = "";
                document.getElementById('p-name').value = "";
                document.getElementById('reader').style.borderColor = "var(--admin-blue)";
            } else {
                alert("Erreur : " + error.message);
            }
            btn.disabled = false;
            btn.innerText = "ENREGISTRER";
        }
    </script>
</body>
</html>
