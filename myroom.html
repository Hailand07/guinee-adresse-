<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HailandX - Console Admin</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --admin-blue: #34495e;
            --success-green: #2ecc71;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 15px;
            color: #2c3e50;
        }

        .admin-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.3rem; color: var(--admin-blue); text-align: center; margin-bottom: 5px; }

        #reader {
            width: 100%;
            min-height: 250px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
            border: 3px solid var(--admin-blue);
            position: relative;
        }

        #reader__scan_region { border: 2px solid rgba(255, 255, 255, 0.2) !important; }

        #reader::after {
            content: "";
            position: absolute;
            top: 50%; left: 10%; right: 10%; height: 2px;
            background: rgba(255, 0, 0, 0.7);
            box-shadow: 0 0 12px red;
            z-index: 5;
            pointer-events: none;
            animation: scanMove 2s infinite ease-in-out;
            display: none;
        }

        .scanning #reader::after { display: block; }

        @keyframes scanMove {
            0% { transform: translateY(-40px); }
            50% { transform: translateY(40px); }
            100% { transform: translateY(-40px); }
        }

        #reader video { object-fit: cover !important; }

        .start-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            z-index: 10;
        }

        .btn-start {
            padding: 15px 30px;
            background: var(--success-green);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        input[readonly] { background: #f0f4f8; color: var(--success-green); border-color: var(--success-green); }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--success-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
        }

        #status-msg { text-align: center; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="admin-container" id="main-cont">
        <h1>🛡️ Admin Catalogue</h1>
        
        <div id="reader">
            <div class="start-overlay" id="overlay">
                <button class="btn-start" onclick="initScanner()">DÉMARRER LE SCANNER</button>
            </div>
        </div>

        <div id="status-msg"></div>

        <div class="form-group">
            <label>Code-Barres</label>
            <input type="text" id="barcode" placeholder="Code auto-détecté..." readonly>
        </div>

        <div class="form-group">
            <label>Nom du Produit</label>
            <input type="text" id="p-name" placeholder="En attente de scan...">
        </div>

        <div class="form-group">
            <label>Catégorie</label>
            <select id="p-cat">
                <option value="Alimentation">Alimentation</option>
                <option value="Boisson">Boisson</option>
                <option value="Hygiène">Hygiène</option>
                <option value="Électronique">Électronique</option>
                <option value="Divers">Divers</option>
            </select>
        </div>

        <button class="btn-save" id="btn-save" onclick="enregistrer()">ENREGISTRER AU CATALOGUE</button>
    </div>

    <script>
        const supabaseUrl = 'https://plisyaquijijmwbbuegy.supabase.co';
        const supabaseKey = 'sb_publishable_nfKDb7KXudkpzLPa-nTMtQ_FRW6sQj_'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let html5QrCode;

        // Fonction pour envoyer dans Supabase automatiquement
        async function autoEnregistrer(produit) {
            const { error } = await _supabase
                .from('referentiel_produits')
                .insert([produit]);
            
            if(!error) {
                const msg = document.getElementById('status-msg');
                msg.innerHTML = "✅ <span style='color:green'>Produit ajouté automatiquement à la base !</span>";
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }

        async function chercherInfosProduit(barcode) {
            const statusMsg = document.getElementById('status-msg');
            const nameInput = document.getElementById('p-name');
            
            statusMsg.innerHTML = "🔍 Vérification locale...";

            const { data } = await _supabase
                .from('referentiel_produits')
                .select('*')
                .eq('code_barre', barcode)
                .maybeSingle();

            if (data) {
                statusMsg.innerHTML = "<span style='color:orange'>⚠️ Déjà présent.</span>";
                nameInput.value = data.nom_standard;
                document.getElementById('p-cat').value = data.categorie || "Divers";
                return;
            }

            statusMsg.innerHTML = "🌍 Recherche Web (OpenData)...";
            
            try {
                // Essai 1 : Open Food Facts (Alimentation)
                let response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                let result = await response.json();

                if (result.status === 1) {
                    const p = result.product;
                    const nouveauProduit = {
                        code_barre: barcode,
                        nom_standard: p.product_name_fr || p.product_name || "Produit Web",
                        description: p.generic_name_fr || p.ingredients_text || "",
                        photos: p.image_url || "",
                        categorie: "Alimentation"
                    };
                    nameInput.value = nouveauProduit.nom_standard;
                    await autoEnregistrer(nouveauProduit);
                    return;
                }

                // Essai 2 : Go-UPC ou Open EAN (Généraliste) via une API de secours si besoin
                // Ici on simule une recherche généraliste simplifiée
                statusMsg.innerHTML = "🌍 Produit non-alimentaire ? Recherche Amazon...";
                
                const searchUrl = `https://www.amazon.fr/s?k=${barcode}`;
                statusMsg.innerHTML = `<span style='color:red'>❌ Inconnu.</span> <a href="${searchUrl}" target="_blank" style="color:blue; font-size:0.8rem;">Vérifier sur Amazon ↗️</a>`;
                nameInput.value = ""; 

            } catch (e) {
                statusMsg.innerHTML = "Erreur de connexion web.";
            }
        }

        async function initScanner() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-cont').classList.add('scanning');

            html5QrCode = new Html5Qrcode("reader", { 
                verbose: false,
                formatsToSupport: [ Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.QR_CODE ]
            });

            const config = { 
                fps: 20, qrbox: { width: 300, height: 150 },
                aspectRatio: 1.0,
                videoConstraints: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            };

            try {
                await html5QrCode.start({ facingMode: "environment" }, config, async (text) => {
                    html5QrCode.pause(); 
                    document.getElementById('barcode').value = text;
                    await chercherInfosProduit(text);
                    setTimeout(() => html5QrCode.resume(), 4000);
                });
                document.getElementById('status-msg').innerText = "Visez un code-barres";
            } catch (err) {
                document.getElementById('overlay').style.display = 'flex';
            }
        }

        async function enregistrer() {
            const barcode = document.getElementById('barcode').value;
            const name = document.getElementById('p-name').value.trim();
            const cat = document.getElementById('p-cat').value;
            const btn = document.getElementById('btn-save');

            if(!barcode || !name) return alert("Données manquantes.");

            btn.disabled = true;
            btn.innerText = "Enregistrement...";

            const { error } = await _supabase
                .from('referentiel_produits')
                .insert([{ code_barre: barcode, nom_standard: name, categorie: cat }]);

            if(!error) {
                alert("✅ Ajouté !");
                document.getElementById('barcode').value = "";
                document.getElementById('p-name').value = "";
            }
            btn.disabled = false;
            btn.innerText = "ENREGISTRER AU CATALOGUE";
        }
    </script>
</body>
</html>
