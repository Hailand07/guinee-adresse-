<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFinded | Bienvenue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="max-w-md w-full space-y-8 animate-fade text-center">
        <header>
            <div class="inline-block p-4 bg-slate-900 rounded-3xl shadow-2xl mb-4">
                <span class="text-4xl">🇬🇳</span>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">iFinded</h1>
            <p class="text-slate-500 font-medium mt-2 italic">Achat, vente et livraison en toute confiance.</p>
        </header>

        <div class="glass-card p-6 rounded-[2.5rem] shadow-xl space-y-4">
            <h2 class="text-sm font-black uppercase tracking-widest text-orange-600">Choisissez votre parcours</h2>
            
            <button onclick="choisirRole('client')" class="w-full group bg-white border-2 border-slate-100 hover:border-orange-500 p-4 rounded-2xl flex items-center gap-4 transition-all shadow-sm">
                <div class="bg-orange-100 text-2xl p-3 rounded-xl group-hover:bg-orange-500 group-hover:scale-110 transition-all">🛒</div>
                <div class="text-left">
                    <span class="block font-black text-slate-900 text-sm">ACHETER</span>
                    <span class="block text-[9px] text-slate-400 font-bold uppercase tracking-tight">Parcourir les produits & commander</span>
                </div>
            </button>

            <button onclick="choisirRole('fournisseur')" class="w-full group bg-white border-2 border-slate-100 hover:border-green-500 p-4 rounded-2xl flex items-center gap-4 transition-all shadow-sm">
                <div class="bg-green-100 text-2xl p-3 rounded-xl group-hover:bg-green-500 group-hover:scale-110 transition-all">🏬</div>
                <div class="text-left">
                    <span class="block font-black text-slate-900 text-sm">VENDRE</span>
                    <span class="block text-[9px] text-slate-400 font-bold uppercase tracking-tight">Gérer mon stock & mes ventes</span>
                </div>
            </button>

            <button onclick="choisirRole('livreur')" class="w-full group bg-white border-2 border-slate-100 hover:border-blue-500 p-4 rounded-2xl flex items-center gap-4 transition-all shadow-sm">
                <div class="bg-blue-100 text-2xl p-3 rounded-xl group-hover:bg-blue-500 group-hover:scale-110 transition-all">🏍️</div>
                <div class="text-left">
                    <span class="block font-black text-slate-900 text-sm">LIVRER</span>
                    <span class="block text-[9px] text-slate-400 font-bold uppercase tracking-tight">Gagner de l'argent en livrant</span>
                </div>
            </button>
        </div>

        <footer class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            Propulsé par hailandX Inc. &bull; 2026
        </footer>
    </div>

    <script>
        window.onload = () => {
            const role = localStorage.getItem('senefounyi_role');
            const user = localStorage.getItem('senefounyi_user_active');
            // Redirection automatique si déjà inscrit
            if (role && user && role !== 'client') {
                window.location.href = role === 'fournisseur' ? 'interface_fournisseur.html' : 'interface_livreur.html';
            }
        };

        function choisirRole(role) {
            localStorage.setItem('senefounyi_role', role);
            if (role === 'client') {
                window.location.href = 'boutique_client.html';
            } else {
                window.location.href = `inscription.html?role=${role}`;
            }
        }
    </script>
</body>
</html>
