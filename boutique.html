<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÉNÉFOUNYI | Espace Vendeur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
        
        <header class="p-6 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight">ESPACE BOUTIQUE</h1>
                <p class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">Ajouter un article</p>
            </div>
            <span class="text-2xl">📦</span>
        </header>

        <main class="p-6 flex-1 space-y-6">
            <div class="space-y-4">
                <div class="group">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nom de l'article</label>
                    <input type="text" id="p-name" placeholder="Ex: Sac de Riz 50kg" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none transition-all">
                </div>

                <div class="group">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Prix (GNF)</label>
                    <input type="number" id="p-price" placeholder="Prix de vente" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none transition-all">
                </div>

                <div class="group">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Votre Boutique / Zone</label>
                    <input type="text" id="p-zone" placeholder="Ex: Boutique Alpha - Cobaya" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none transition-all">
                </div>

                <div class="group">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Lien Photo (URL)</label>
                    <input type="text" id="p-image" placeholder="Collez le lien de l'image ici" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none transition-all">
                </div>
            </div>

            <button onclick="addProduct()" id="btn-add" class="w-full bg-orange-500 text-white font-black py-5 rounded-[2rem] shadow-lg shadow-orange-200 hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest text-xs mt-4">
                Mettre en vente l'article
            </button>

            <div class="mt-10">
                <h2 class="text-xs font-black uppercase text-slate-900 mb-4 tracking-tighter">Mes articles en ligne</h2>
                <div id="product-list" class="space-y-3">
                    <p class="text-center text-slate-300 text-xs py-10">Chargement de votre stock...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const _supabase = supabase.createClient("https://mxgdthpexmszutqhoawb.supabase.co", "sb_publishable_5Zxd2bCkRABYyBubCNXpdQ_jwZol9Rc");

        // Fonction pour ajouter un produit
        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const zone = document.getElementById('p-zone').value;
            const image = document.getElementById('p-image').value;

            if(!name || !price) return alert("Veuillez remplir au moins le nom et le prix.");

            const btn = document.getElementById('btn-add');
            btn.innerText = "ENCOURS...";
            btn.disabled = true;

            const { error } = await _supabase.from('produits').insert([
                { nom_produit: name, prix: price, zone: zone, image_url: image }
            ]);

            if (error) {
                alert("Erreur : " + error.message);
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
            } else {
                location.reload(); // On rafraîchit pour voir le nouveau produit
            }
        }

        // Fonction pour afficher le stock
        async function loadProducts() {
            const { data, error } = await _supabase.from('produits').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('product-list');

            if (data && data.length > 0) {
                container.innerHTML = "";
                data.forEach(p => {
                    container.innerHTML += `
                        <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                            <div class="w-12 h-12 bg-slate-200 rounded-xl overflow-hidden">
                                <img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-1">
                                <h3 class="text-xs font-bold text-slate-900 uppercase">${p.nom_produit}</h3>
                                <p class="text-[10px] text-slate-500 font-bold">${p.prix} GNF</p>
                            </div>
                            <span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full font-black uppercase">En ligne</span>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p class='text-center text-slate-300 text-xs py-10'>Aucun article pour le moment.</p>";
            }
        }

        loadProducts();
    </script>
</body>
</html>
