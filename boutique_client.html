<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFinded | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>.no-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md p-4 z-50 flex justify-between items-center border-b border-slate-100 shadow-sm">
        <h1 class="font-black text-xl tracking-tighter uppercase">iFinded</h1>
        <button onclick="document.getElementById('side-menu').classList.remove('translate-x-full')" class="p-2 bg-slate-50 rounded-xl">☰</button>
    </nav>

    <div id="side-menu" class="fixed inset-0 z-[100] translate-x-full transition-transform duration-300">
        <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" onclick="this.parentElement.classList.add('translate-x-full')"></div>
        <div class="absolute right-0 top-0 h-full w-72 bg-white p-8 flex flex-col shadow-2xl">
            <button onclick="this.parentElement.parentElement.classList.add('translate-x-full')" class="self-end text-xl mb-10 font-black">✕</button>
            <div class="space-y-6 flex flex-col">
                <a href="ifinded.html" class="font-black text-xs uppercase tracking-widest text-slate-400">🏠 Accueil iFinded</a>
                <hr>
                <a href="inscription.html?role=fournisseur" class="font-black text-sm uppercase text-green-600 tracking-tighter italic">Vendre un produit</a>
                <a href="inscription.html?role=livreur" class="font-black text-sm uppercase text-blue-600 tracking-tighter italic">Devenir Livreur</a>
                <hr>
                <button onclick="localStorage.clear(); window.location.href='ifinded.html';" class="mt-auto text-red-500 font-black text-[10px] uppercase tracking-widest border-2 border-red-500 p-4 rounded-2xl">Se déconnecter</button>
            </div>
        </div>
    </div>

    <header class="p-4 space-y-4">
        <div class="relative">
            <input type="text" id="search" oninput="chargerBoutique()" placeholder="Que cherchez-vous ?" class="w-full p-5 rounded-[1.5rem] bg-white shadow-xl border-none outline-none focus:ring-2 ring-slate-900 font-bold text-sm">
            <span class="absolute right-6 top-5">🔍</span>
        </div>
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <button class="bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase shadow-lg">Tout</button>
            <button class="bg-white text-slate-400 px-6 py-2 rounded-full text-[10px] font-black uppercase shadow-sm border border-slate-100 whitespace-nowrap">À proximité 📍</button>
        </div>
    </header>

    <main id="liste-produits" class="p-4 grid grid-cols-2 gap-4">
        </main>

    <script>
        const _supabase = supabase.createClient("https://plisyaquijijmwbbuegy.supabase.co", "sb_publishable_nfKDb7KXudkpzLPa-nTMtQ_FRW6sQj_");

        async function chargerBoutique() {
            const search = document.getElementById('search').value.toLowerCase();
            const { data, error } = await _supabase.from('produits').select('*');
            const container = document.getElementById('liste-produits');
            container.innerHTML = "";

            if(data) {
                const filtered = data.filter(p => p.nom_produit.toLowerCase().includes(search));
                filtered.forEach(p => {
                    container.innerHTML += `
                        <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 p-2">
                            <img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-full h-32 object-cover rounded-[1.5rem] mb-2">
                            <h3 class="font-black text-[10px] uppercase truncate px-1">${p.nom_produit}</h3>
                            <p class="text-[8px] font-bold text-slate-400 mb-2 px-1 italic">📍 ${p.zone}</p>
                            <div class="flex justify-between items-center p-1">
                                <span class="text-xs font-black text-orange-600">${p.prix} <small class="text-[7px]">GNF</small></span>
                                <button class="bg-slate-900 text-white text-[8px] px-3 py-2 rounded-xl font-black transition-transform active:scale-90">VOIR</button>
                            </div>
                        </div>
                    `;
                });
            }
        }
        window.onload = chargerBoutique;
    </script>
</body>
</html>
